<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>venda seu carro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
    <header class="cabecalho">
        <h3>cadastre seu veículo para vender mais rapido</h3>
    </header>
    <div class="form-container">
        <div class="form-header">
            <p>formulario</p>
        </div>

    <div class="form-body">
        <h1 class="titulo-form">venda facil seu carro</h1>
        <p>descreva as caraterística do seu carro e marque os opcionais que ele possui.</p>
        <form>
            <div class="caixaInputs">
                <label for="title">titulo do anuncio<span class=""campo-obrigatorio>*</span></label>
                <input type="text" name="title" id="title" class="block" placeholder="digite tiulo para o anuncio">
            </div>
            <div class="caixaInputs">
                <label for="preco">preço<span class=""campo-obrigatorio>*</span></label>
                <input type="number" name="preco" id="preco" class="block" placeholder="digite o preco">
            </div>
            <div class="caixaInputs">
                <label for="descricao">descrição<span class="campo obrigatorio">*</span></label>
                <textarea name="descricao" id="descricao" class="block" placeholder="digite a descricao de seu veículo"></textarea>
            </div>
            <div class="caixaInputs">
                <label for="marca">marca<span class=""campo-obrigatorio>*</span></label>
                <input type="text" name="marca" id="marca" class="block" placeholder="digite a marca">
            </div>
            <div class="caixaInputs">
                <label for="modelo">modelo<span class=""campo-obrigatorio>*</span></label>
                <input type="text" name="modelo" id="marca" class="block" placeholder="digite o modelo">
            </div>
            <div class="caixaInputs">
                <label for="kilometragem">kilometragem<span class=""campo-obrigatorio>*</span></label>
                <input type="text" name="kilometragem" id="kilometragem" class="block" placeholder="digite a kilometragem">
            </div>
            <div class="caixaInputs">
                <label for="data-compra">data de compra<span class=""campo-obrigatorio>*</span></label>
                <input type="date" name="data-compra" id="data-compra" class="block" placeholder="digite a data da compra">
            </div>
            <div class="caixaInputs">
                <p>tipo de câmbio:<span class="campo-obrigatorio">*</span></p>
                <input type="radio" nome="marcha" id=" auto ou manual">
                <label for="auto">automático/manual</label>
            </div>
            <divi class="caixaOpcional">
                <p>Opcionais</p>
                <ul class="listasOpicionais">
                    <li>
                        <input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                        <label for="airbag">Airbag</label>
                    </li>
                    <li>
                         <input type="alarme" name="alarme[]" id="alarme" value="alarme">
                        <label for="alarme">Alarme</label>
                    </li>
                    <li>
                       <input type="ar condicionado" name="ar condicionado[]" id="ar condicionado" value="ar condicionado">
                        <label for="ar condicionado">Ar condicionado</label> 
                    </li>
                    <li>
                       <input type="camera de ré" name="camera de ré[]" id="camera de ré" value="camera de ré">
                        <label for="camera de ré">camera de ré</label> 
                    </li>
                </ul>
            </divi>  <divi class="caixaOpcional">
                <p>Opcionais</p>
                <ul class="listasOpicionais">
                    <li>
                        <input type="checkbox" name="opcional[]" id="assistente de pista" value="assistente de pista">
                        <label for="assistente de pista">assistente de pista</label>
                    </li>
                    <li>
                         <input type="partida sem chave" name="partida sem chave[]" id="partida sem chave" value="">
                        <label for="partida sem chave">Partida sem chave</label>
                    </li>
                    <li>
                       <input type="integração com celular" name="integração com celular[]" id="integração com celular" value="integração com celular">
                        <label for="integração com celular">integração como celular</label> 
                    </li>
                    <li>
                       <input type="banco de couro" name="banco de couro[]" id="banco de couro" value="banco de couro">
                        <label for="banco de couro">banco de couro</label> 
                    </li>
                </ul>
            </divi>
            <div class="caixaInpusts">
                <p>fotos do carro <span class="campo-obrigatorio">*</span></p>
                <input type="file" name="images" id="images" multiple accept="image/png, image/jpg">
            </div>
            <input type="submit" value="Enviar" class="btn-submit">
        </form>
    </div>
    </div>
</body>
</html>
